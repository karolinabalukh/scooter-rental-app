server:
  port: 8080


spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: scooter-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/scooters/**

        - id: ride-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/rides/**